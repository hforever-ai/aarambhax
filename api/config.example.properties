; Aarambha contact API — copy to config.local.properties on Hostinger (same folder as contact.php).
; Do not commit config.local.properties (see repo .gitignore).

db_host=localhost
db_name=your_database_name
db_user=your_database_user
db_pass=your_database_password

; Classic reCAPTCHA v3 (siteverify). Required unless Enterprise block below is fully set.
recaptcha_secret=

; Enterprise (Create Assessment). Leave api key empty to use classic verification only.
recaptcha_site_key=
recaptcha_enterprise_project_id=
recaptcha_enterprise_api_key=
recaptcha_expected_action=contact_form

email_to=hello@aarambhax.com
email_from=noreply@aarambhax.com

; Max submissions per IP per hour
rate_limit_max=5
